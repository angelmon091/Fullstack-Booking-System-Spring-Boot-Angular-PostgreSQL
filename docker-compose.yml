services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reservation
      POSTGRES_USER: a
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reservation-network

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/reservation
      DB_USER: a
      DB_PASSWORD: password
    ports:
      - "8090:8090"
    depends_on:
      - db
    networks:
      - reservation-network

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - reservation-network

networks:
  reservation-network:
    driver: bridge

volumes:
  postgres_data:
