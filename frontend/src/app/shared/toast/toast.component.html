@if (message()) {
  <div
    class="toast toast--{{ type() }}"
    role="alert"
    aria-live="assertive"
    [attr.aria-label]="type() === 'error' ? 'Mensaje de error' : 'Mensaje de éxito'"
  >
    <p class="toast__message">{{ message() }}</p>
    <button
      type="button"
      class="toast__close"
      (click)="close()"
      aria-label="Cerrar notificación"
    >
      Cerrar
    </button>
  </div>
}
